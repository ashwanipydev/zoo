spring.application.name=backend
server.port=8080

spring.datasource.url=jdbc:postgresql://localhost:5432/zoo_db
spring.datasource.username=zoo_admin
spring.datasource.password=${DB_PASSWORD:zoo_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# Use Flyway migrations (no JPA/Hibernate)
spring.flyway.enabled=true

# CORS (comma-separated origin patterns)
app.cors.allowed-origins=http://localhost:3000

# JWT configuration
jwt.secret=${JWT_SECRET:ZooBookingSystemSecretKeyChangeInProduction2026!@#}
jwt.expirationMs=86400000

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.show-extensions=true

# Email Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Thymeleaf Configuration for Email Templates
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false

# Logging Configuration
logging.level.root=INFO
logging.level.com.zoo.booking.security=DEBUG
logging.level.com.zoo.booking.controller=DEBUG
logging.level.org.springframework.security=INFO
