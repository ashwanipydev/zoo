    body { font-family: 'Public Sans', sans-serif; }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background text-on-background min-h-screen flex flex-col md:flex-row overflow-x-hidden">
<!-- Suppression Check: Login page is transactional, so TopAppBar and BottomNavBar are excluded per instructions -->
<!-- Left Side: Hero Landscape -->
<section class="relative w-full md:w-1/2 lg:w-3/5 h-64 md:h-screen overflow-hidden">
<div class="absolute inset-0 bg-primary/20 mix-blend-multiply z-10"></div>
<img alt="Lush botanical garden" class="w-full h-full object-cover" data-alt="Wide angle view of a sunlit Victorian greenhouse filled with giant tropical ferns, exotic palms, and dappled morning sunlight filtering through glass." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDuPeMc8RYtmRlI5NFHyfIG3dBXgpJldPiLpby4hpEoMP2Y9tyDBRUOIyDs4RbTja4Tg8DFZO6PqSpEfiL1-fcFBTxUc6UBfbBjKhL_UY1HyrbdAV5AD3G1rMa7hr0I0hun2LvrDILQ0rzeOS2pCohCnAEJgYdyNHDHm2PsKgeoCBwV8EelZQoaSgulQUwUZRHNdAqGZAixakG5TpMPd5v9Etg6BgyyRyNuYrb3c1_Irl6_X1GazBcbXaxjotcj87a4EQUNzTEmUxg"/>
<div class="absolute bottom-12 left-12 z-20 hidden md:block">
<div class="flex items-center gap-3 mb-4">
<span class="material-symbols-outlined text-on-primary bg-primary p-2 rounded-xl" data-icon="park">park</span>
<h1 class="text-white text-2xl font-bold tracking-tight">Civic Naturalist</h1>
</div>
<p class="text-white/90 text-lg max-w-md leading-relaxed font-light">
        Preserving the intersection of urban life and biological diversity since 1924.
      </p>
</div>
</section>
<!-- Right Side: Sign In Canvas -->
<section class="w-full md:w-1/2 lg:w-2/5 min-h-screen bg-surface flex items-center justify-center p-8 md:p-16 lg:p-24">
<div class="w-full max-w-md">
<!-- Brand Header for Mobile -->
<div class="md:hidden flex flex-col items-center mb-12">
<span class="material-symbols-outlined text-primary text-4xl mb-2" data-icon="park">park</span>
<h2 class="text-on-surface text-xl font-bold tracking-tighter">Civic Naturalist</h2>
</div>
<!-- Sign In Content -->
<header class="mb-10">
<h3 class="text-on-surface text-4xl font-extrabold tracking-tight mb-2">Sign In</h3>
<p class="text-on-surface-variant font-medium">Welcome back to the sanctuary.</p>
</header>
<form action="#" class="space-y-6">
<!-- Email Input -->
<div class="space-y-2">
<label class="block text-on-surface-variant text-[10px] uppercase tracking-[0.1em] font-bold" for="email">Email Address</label>
<div class="relative">
<input class="w-full h-14 px-5 bg-surface-container-high border-none rounded-xl text-on-surface placeholder:text-outline-variant focus:ring-2 focus:ring-primary focus:bg-surface-container-highest transition-all duration-200" id="email" placeholder="naturalist@civic.org" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<div class="flex justify-between items-end">
<label class="block text-on-surface-variant text-[10px] uppercase tracking-[0.1em] font-bold" for="password">Password</label>
<a class="text-primary text-sm font-semibold hover:underline" href="#">Forgot Password?</a>
</div>
<div class="relative">
<input class="w-full h-14 px-5 bg-surface-container-high border-none rounded-xl text-on-surface placeholder:text-outline-variant focus:ring-2 focus:ring-primary focus:bg-surface-container-highest transition-all duration-200" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant" type="button">
<span class="material-symbols-outlined text-xl" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Submit Button -->
<button class="w-full h-14 bg-primary text-on-primary font-bold rounded-xl shadow-[0px_12px_32px_rgba(70,101,83,0.15)] hover:bg-primary-dim active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-2" type="submit">
          Sign In
          <span class="material-symbols-outlined text-xl" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="my-10 flex items-center gap-4">
<div class="h-[1px] flex-grow bg-outline-variant/30"></div>
<span class="text-on-surface-variant text-[10px] uppercase tracking-widest font-bold">Or continue with</span>
<div class="h-[1px] flex-grow bg-outline-variant/30"></div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-3 h-14 border border-outline-variant/20 rounded-xl hover:bg-surface-container-low transition-colors duration-200 group">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="currentColor"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="currentColor"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="currentColor"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="currentColor"></path>
</svg>
<span class="text-on-surface text-sm font-semibold">Google</span>
</button>
<button class="flex items-center justify-center gap-3 h-14 border border-outline-variant/20 rounded-xl hover:bg-surface-container-low transition-colors duration-200 group">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M17.05 20.28c-.96.95-2.04 1.43-3.23 1.43-1.16 0-2.14-.42-2.94-1.25-.82.83-1.8 1.25-2.95 1.25-1.18 0-2.26-.48-3.23-1.43C3.72 19.33 3.23 18.25 3.23 17.05c0-1.2.49-2.28 1.46-3.23l6.17-6.17c.28-.28.61-.42 1-.42s.72.14 1 .42l6.17 6.17c.97.95 1.46 2.03 1.46 3.23 0 1.2-.49 2.28-1.44 3.23zM12 2c.83 0 1.5.67 1.5 1.5S12.83 5 12 5s-1.5-.67-1.5-1.5S11.17 2 12 2z" fill="currentColor"></path>
</svg>
<span class="text-on-surface text-sm font-semibold">Apple</span>
</button>
</div>
<!-- Footer Action -->
<footer class="mt-12 text-center">
<p class="text-on-surface-variant text-sm font-medium">
          Don't have an account? 
          <a class="text-primary font-bold hover:underline ml-1" href="#">Create an Account</a>
</p>
</footer>
</div>
</section>
<!-- Ambient Texture Overlay -->
<div class="fixed inset-0 pointer-events-none z-50 opacity-[0.03]" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuD0ss7sruYxrU1SiogWtsG4BLIXLt2vCB92zUxIjPrX_GGDMJDpiCasCG8GZRMs584aBvRQqzFT6YSX5S9zRyjHcZFjYrfk46OoWLi9xdQtFK5a5kOnt4YMa9pKOsVdVd_b83OBQmHzUPX4PxUkSe0loWCnHZr81eo6qE7HifBt5BbugbdYezBqha0fKjzeFJRVYl78OOkgnnfvuWwo_yMmgOt31nkOrmARBlw_pUiZQ0iLIFSaAN-sGwjcy8_yEN5LWD81leyTxjE');"></div>
</body></html>
